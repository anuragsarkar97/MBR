# GoReleaser configuration for mbr
# Run: goreleaser release --clean
# Docs: https://goreleaser.com

version: 2

project_name: mbr

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: mbr
    main: ./cmd/mbr
    binary: mbr
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Windows arm64 is rarely needed; add back if there is demand.
      - goos: windows
        goarch: arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/angsak/mbr/internal/version.Version={{.Version}}
      - -X github.com/angsak/mbr/internal/version.Commit={{.Commit}}
      - -X github.com/angsak/mbr/internal/version.Date={{.Date}}

archives:
  - id: mbr
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    # Filename pattern matches what install.sh expects.
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - scripts/install.sh
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: angsak
    name: mbr
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} {{.Tag}}"
